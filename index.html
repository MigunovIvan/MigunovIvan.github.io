<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Иван Мигунов · Проекты</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="avatar">
                <img src="images/profile.jpg" alt="Ivan Migunov" id="profile-photo">
                <div>
                    <h1>Иван Мигунов</h1>
                    <p>frontend & pet‑проекты</p>
                </div>
            </div>
            <button id="toggle-theme" class="theme-switch" aria-label="Тёмная тема">🌙</button>
        </div>
    </header>

    <main>
        <div class="toolbar">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="search" placeholder="Название или описание...">
            </div>
            <div class="sort-box">
                <label>📋 Сортировать:</label>
                <select id="sort">
                    <option value="name">по имени</option>
                    <option value="stars">⭐ по звёздам</option>
                    <option value="updated">🕒 по обновлению</option>
                </select>
            </div>
            <div class="counter" id="counter">проектов: <span>0</span></div>
        </div>

        <div id="projects-grid" class="projects-grid">
            <!-- скелетоны или карточки -->
        </div>

        <div id="error-message" class="error-message" style="display: none;">
            ⚠️ Не удалось загрузить проекты. <button id="retry">Повторить</button>
        </div>
    </main>

    <footer>
        <p>© 2025 · <a href="https://github.com/MigunovIvan" target="_blank">GitHub</a></p>
    </footer>

</body>
</html>
